apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-app
  template:
    metadata:
      labels:
        app: stock-app
    spec:
      containers:
      - name: stock-container
        image: us-central1-docker.pkg.dev/grow-info-service/grow-repo/stock-app:ab7f1a8ee6bbffc419f116e4bc8105bb7bfb2b45
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: stock-service
spec:
  type: LoadBalancer
  selector:
    app: stock-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080